# .github/workflows/release.yml
#
# Triggered by pushing a v* tag (e.g. v0.2.0). Builds multi-arch
# binaries, attaches them to a GitHub release, and opens a PR on
# the homebrew-tap repo if one is configured.
#
# To cut a release:
#   git tag v0.2.0
#   git push origin v0.2.0
# The release.yml workflow will run; the .goreleaser.yaml config
# drives the rest.
name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Check go mod tidy
        run: |
          go mod tidy
          test -z "$(git diff -- go.mod go.sum)" || (echo "go.mod/go.sum are stale." && exit 1)

      - name: Sanity build
        run: go build ./...

      - name: Check formatting
        run: test -z "$(go fmt ./...)" || (echo "Not formatted." && exit 1)

      - name: Check go mod tidy
        run: |
          go mod tidy
          test -z "$(git diff -- go.mod go.sum)" || (echo "go.mod/go.sum are stale." && exit 1)

      - name: Sanity test
        run: go test ./... -count=1

      - name: Run go vet
        run: go vet ./...

      - name: Run staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: Install goreleaser
        run: |
          go install github.com/goreleaser/goreleaser/v2/cmd/goreleaser@latest

      - name: Run goreleaser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: goreleaser release --clean