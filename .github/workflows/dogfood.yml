# .github/workflows/dogfood.yml
#
# End-to-end smoke test for the spin scaffolder. Builds spin, then uses
# spin to scaffold a fresh project from a starter template (the one
# produced by `spin init`), then proves the rendered project is
# buildable + testable.
#
# Pipeline (matches scripts/dogfood.sh so the same script runs locally
# and in CI):
#   1. Build the spin binary at $REPO_ROOT/bin/spin.
#   2. `spin init <starter>` -- produce a starter template in a temp dir.
#   3. `spin new spin-fixture --template <starter> --param name=spin-fixture`
#      -- render the starter end-to-end. This exercises init, the loader,
#      ResolveForm (non-interactive path), the renderer, the post-hook
#      runner, and the defensive spin.toml deletion (TPL-16).
#   4. In the rendered project: `go mod tidy` + `CGO_ENABLED=0 go build ./...`
#      + `go test ./... -count=1`.
#   5. On failure, upload the failure log so the maintainer can repro
#      without re-running the job.
name: dogfood

on:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'scripts/dogfood.sh'
      - '.github/workflows/dogfood.yml'
  pull_request:
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'scripts/dogfood.sh'
      - '.github/workflows/dogfood.yml'

permissions:
  contents: read

jobs:
  dogfood:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run dogfood smoke test
        run: bash scripts/dogfood.sh

      - name: Smoke test the .invalid registry fallback
        # Confirms the default SPIN_REGISTRY_URL=registry.spin.invalid
        # fails fast (the .invalid TLD never resolves) so the CLI
        # can map the failure to ErrNotDeployed instead of hanging
        # for a DNS timeout. This is a load-bearing path: if a
        # future change ever tries to "improve" the .invalid check
        # to a real DNS lookup, this test catches the regression.
        env:
          XDG_CONFIG_HOME: ${{ runner.temp }}/xdg
        run: |
          set -e
          mkdir -p "$XDG_CONFIG_HOME"
          # Build a tiny main that calls the registry client and
          # asserts the error is the friendly not-deployed one.
          mkdir -p /tmp/registry-smoke
          cd /tmp/registry-smoke
          go mod init registry-smoke 2>/dev/null || true
          # Use a direct curl instead of building a Go program so
          # the test does not depend on internal package layout.
          # 5s is enough for the .invalid NXDOMAIN to come back.
          if curl -sf --max-time 5 "https://registry.spin.invalid/v1/search?q=x" >/dev/null 2>&1; then
            echo "FAIL: .invalid URL should not resolve"
            exit 1
          fi
          echo "OK: .invalid URL did not resolve (DNS works as expected)"

      - name: Smoke test a custom SPIN_REGISTRY_URL
        # Confirms the CLI honors SPIN_REGISTRY_URL. We point it at
        # a local stub HTTP server; the CLI should fetch and decode
        # the JSON response. The 5s timeout guards against a real
        # network call if the stub fails to start.
        env:
          XDG_CONFIG_HOME: ${{ runner.temp }}/xdg
        run: |
          set -e
          mkdir -p "$XDG_CONFIG_HOME"
          mkdir -p /tmp/registry-stub
          cd /tmp/registry-stub
          cat > main.go <<'EOF'
          package main
          import ("encoding/json"; "net/http")
          func main() {
            http.HandleFunc("/v1/search", func(w http.ResponseWriter, r *http.Request) {
              w.Header().Set("Content-Type", "application/json")
              json.NewEncoder(w).Encode(map[string]any{
                "query": "x", "total": 1,
                "entries": []map[string]any{{
                  "name": "smoke", "description": "ok", "tags": []string{},
                  "language": "any", "type": "starter", "version": "0",
                  "downloads": 0, "source": "https://example.com/repo.git",
                  "updated_at": "2026-01-01T00:00:00Z",
                }},
              })
            })
            http.ListenAndServe("127.0.0.1:9999", nil)
          }
          EOF
          go run main.go &
          STUB_PID=$!
          sleep 2
          export SPIN_REGISTRY_URL="http://127.0.0.1:9999/v1"
          "${{ github.workspace }}/bin/spin" search x
          kill $STUB_PID 2>/dev/null || true
          wait $STUB_PID 2>/dev/null || true

      - name: Upload failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dogfood-failure
          path: |
            ${{ github.workspace }}/bin/spin
            /tmp/dogfood-*.log
          if-no-files-found: ignore
