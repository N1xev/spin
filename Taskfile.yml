# Taskfile.yml — spin's own dev workflow
# https://taskfile.dev

version: '3'

vars:
  NAME: spin
  BIN: ./bin/{{.NAME}}

env:
  CGO_ENABLED: '0'

tasks:
  default:
    cmds:
      - task: build

  build:
    desc: Build the spin binary
    cmds:
      - go build -o {{.BIN}} .

  test:
    desc: Run unit and integration tests
    cmds:
      - go test ./... -count=1

  # The grep suite covers three classes of template regression:
  #   1. v1 charmbracelet API/path leaks (check-v1-leaks.sh)
  #   2. Deprecated .air.toml `build.bin` form (check-air-bin.sh)
  #   3. Missing Taskfile.yml `setup:` target (check-taskfile-setup.sh)
  # The templates dir is the unit-of-truth for the generated configs;
  # any of these scripts failing means a scaffold regression will land
  # in a user's project.
  grep-v1-leaks:
    desc: Grep the embedded templates for v1 / air-config / Taskfile-setup regressions
    cmds:
      - bash scripts/check-v1-leaks.sh ./internal/scaffold/templates
      - bash scripts/check-air-bin.sh ./internal/scaffold/templates
      - bash scripts/check-taskfile-setup.sh ./internal/scaffold/templates

  lint:
    desc: Run golangci-lint
    cmds:
      - test -x "$(go env GOPATH)/bin/golangci-lint" && golangci-lint run ./... || echo "golangci-lint not installed; skipping"

  clean:
    cmds:
      - rm -rf ./bin ./tmp ./dist
